<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天多一天，明天多一分｜聽力練習第四回</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Playfair+Display:wght@700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --parchment: #fdf6e8;
    --gold: #c8973a;
    --gold-light: #e8c678;
    --gold-pale: #f7edd4;
    --crimson: #8b1a1a;
    --sage: #3d5a47;
    --shadow: rgba(26,18,9,0.12);
    --border: #d4b87a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #f0e8d4;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(200,151,58,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(139,26,26,0.05) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8973a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    min-height: 100vh;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--ink);
  }

  .page-frame {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* HEADER */
  .site-header {
    text-align: center;
    padding: 50px 30px 40px;
    position: relative;
    margin-bottom: 10px;
  }

  .header-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-bottom: 24px;
  }

  .ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    max-width: 120px;
  }

  .ornament-diamond {
    width: 10px; height: 10px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .site-title {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900;
    color: var(--ink);
    letter-spacing: 0.02em;
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .site-title span {
    color: var(--gold);
  }

  .site-subtitle {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.05rem;
    color: var(--crimson);
    letter-spacing: 0.25em;
    font-weight: 600;
    margin-top: 6px;
  }

  /* MAIN CARD */
  .main-card {
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 8px 40px var(--shadow), 0 2px 8px rgba(200,151,58,0.1);
    overflow: hidden;
    position: relative;
  }

  .main-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--crimson), var(--gold), var(--sage), var(--gold), var(--crimson));
  }

  .card-inner { padding: 48px 52px 52px; }

  @media (max-width: 600px) {
    .card-inner { padding: 32px 24px 36px; }
  }

  /* STEP SECTIONS */
  .step-section {
    margin-bottom: 36px;
  }

  .step-label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .step-number {
    width: 32px; height: 32px;
    background: var(--ink);
    color: var(--gold-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .step-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: #6b5122;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 34px 0;
    opacity: 0.6;
  }

  /* BUTTONS */
  .btn-main {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #2a1f0e 0%, #3d2e10 100%);
    color: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: 3px;
    padding: 14px 32px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
    box-shadow: 0 3px 12px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,220,120,0.15);
    position: relative;
    overflow: hidden;
  }

  .btn-main::after {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,220,120,0.08), transparent);
    transition: left 0.4s ease;
  }

  .btn-main:hover::after { left: 100%; }
  .btn-main:hover {
    background: linear-gradient(135deg, #3d2e10 0%, #5a4218 100%);
    box-shadow: 0 5px 20px rgba(0,0,0,0.3), 0 0 0 1px var(--gold-light);
    transform: translateY(-1px);
  }
  .btn-main:active { transform: translateY(0); }

  .btn-icon { font-size: 1.2rem; }

  /* AUDIO PLAYER */
  .audio-wrapper {
    display: none;
    margin-top: 24px;
    animation: fadeSlideIn 0.4s ease;
  }
  .audio-wrapper.visible { display: block; }

  .audio-label {
    font-size: 0.8rem;
    color: #7a6240;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'Noto Serif TC', serif;
  }

  audio {
    width: 100%;
    border-radius: 3px;
    accent-color: var(--gold);
    height: 44px;
  }

  /* ANSWERS GRID */
  .answers-wrapper {
    display: none;
    margin-top: 24px;
    animation: fadeSlideIn 0.4s ease;
  }
  .answers-wrapper.visible { display: block; }

  .answers-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    color: var(--crimson);
    letter-spacing: 0.2em;
    margin-bottom: 20px;
    font-weight: 700;
  }

  .answers-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .answer-cell {
    background: var(--parchment);
    padding: 14px 8px;
    text-align: center;
    transition: background 0.2s;
  }

  .answer-cell:hover { background: var(--gold-pale); }

  .answer-num {
    font-size: 0.72rem;
    color: #9a8060;
    font-family: 'Noto Serif TC', serif;
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }

  .answer-val {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--crimson);
  }

  /* ANALYSIS SECTION */
  .analysis-wrapper {
    display: none;
    margin-top: 24px;
    animation: fadeSlideIn 0.4s ease;
  }
  .analysis-wrapper.visible { display: block; }

  .query-box {
    background: var(--gold-pale);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 28px 28px 24px;
  }

  .query-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .query-hint {
    font-size: 0.8rem;
    color: #7a6240;
    margin-bottom: 18px;
    line-height: 1.5;
  }

  .query-hint strong { color: var(--crimson); }

  .query-input-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .query-input {
    flex: 1;
    min-width: 200px;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 11px 16px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.95rem;
    background: var(--parchment);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .query-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(200,151,58,0.15); }

  .btn-query {
    background: var(--crimson);
    color: #fdf0e0;
    border: none;
    border-radius: 3px;
    padding: 11px 24px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-query:hover { background: #6e1414; transform: translateY(-1px); }

  .error-msg {
    display: none;
    margin-top: 10px;
    color: var(--crimson);
    font-size: 0.83rem;
    font-family: 'Noto Serif TC', serif;
  }

  /* RESULT CARDS */
  .results-area {
    display: none;
    margin-top: 28px;
    animation: fadeSlideIn 0.4s ease;
  }
  .results-area.visible { display: block; }

  .result-card {
    background: white;
    border: 1px solid var(--border);
    border-left: 4px solid var(--gold);
    border-radius: 3px;
    padding: 22px 24px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .result-num-badge {
    background: var(--ink);
    color: var(--gold-light);
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  .result-answer-badge {
    background: var(--crimson);
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 3px 14px;
    border-radius: 2px;
  }

  .result-script-label {
    font-size: 0.75rem;
    color: #7a6240;
    letter-spacing: 0.15em;
    font-family: 'Noto Serif TC', serif;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .result-script {
    font-size: 0.9rem;
    line-height: 1.85;
    color: #2a1f0e;
    white-space: pre-line;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* RESET BUTTON */
  .btn-reset {
    display: none;
    margin-top: 22px;
    background: transparent;
    color: var(--sage);
    border: 1px solid var(--sage);
    border-radius: 3px;
    padding: 11px 28px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .btn-reset.visible { display: inline-flex; align-items: center; gap: 8px; }
  .btn-reset:hover { background: var(--sage); color: white; transform: translateY(-1px); }

  /* FOOTER MOTTO */
  .footer-motto {
    text-align: center;
    margin-top: 50px;
    padding: 36px 30px;
    position: relative;
  }

  .footer-motto::before, .footer-motto::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto;
  }

  .footer-motto::before { margin-bottom: 22px; }
  .footer-motto::after { margin-top: 22px; }

  .motto-en {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    font-style: italic;
  }

  .motto-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    color: #7a6240;
    letter-spacing: 0.18em;
    font-weight: 400;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="page-frame">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>
    <h1 class="site-title">今天多一天，<span>明天多一分</span></h1>
    <p class="site-subtitle">聽力練習　第四回</p>
    <div class="header-ornament" style="margin-top:22px;margin-bottom:0">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>
  </header>

  <!-- MAIN CARD -->
  <div class="main-card">
    <div class="card-inner">

      <!-- STEP 1 -->
      <div class="step-section">
        <div class="step-label">
          <div class="step-number">一</div>
          <div class="step-title">播放聽力</div>
        </div>

        <button class="btn-main" onclick="toggleAudio()">
          <span class="btn-icon">🎧</span>
          <span id="audioBtn">點我聽聽力</span>
        </button>

        <div class="audio-wrapper" id="audioWrapper">
          <p class="audio-label">▶ 聽力音檔 — 第四回</p>
          <audio id="audioPlayer" controls>
            <source src="仿會考聽力試卷-第四回聽力檔 (1).mp3" type="audio/mpeg">
            您的瀏覽器不支援音訊播放，請更新瀏覽器。
          </audio>
        </div>
      </div>

      <hr class="divider">

      <!-- STEP 2 -->
      <div class="step-section">
        <div class="step-label">
          <div class="step-number">二</div>
          <div class="step-title">對答案</div>
        </div>

        <button class="btn-main" onclick="showAnswers()">
          <span class="btn-icon">✅</span>
          <span>點我對答案</span>
        </button>

        <div class="answers-wrapper" id="answersWrapper">
          <p class="answers-title">▎ 第四回答案</p>
          <div class="answers-grid" id="answersGrid"></div>
        </div>
      </div>

      <hr class="divider">

      <!-- STEP 3 -->
      <div class="step-section">
        <div class="step-label">
          <div class="step-number">三</div>
          <div class="step-title">看解析</div>
        </div>

        <button class="btn-main" onclick="showAnalysis()">
          <span class="btn-icon">📖</span>
          <span>點我看解析</span>
        </button>

        <div class="analysis-wrapper" id="analysisWrapper">
          <div class="query-box">
            <p class="query-title">查詢題目解析</p>
            <p class="query-hint">
              請輸入題號（1–21），以逗號分隔，例如：<strong>3, 7, 15</strong><br>
              一次最多查詢 <strong>5 題</strong>
            </p>
            <div class="query-input-row">
              <input type="text" class="query-input" id="queryInput" placeholder="輸入題號，如 1, 5, 10" />
              <button class="btn-query" onclick="lookupAnalysis()">查詢解析</button>
            </div>
            <p class="error-msg" id="errorMsg"></p>
          </div>

          <div class="results-area" id="resultsArea"></div>

          <button class="btn-reset" id="resetBtn" onclick="resetQuery()">
            ↩ 重新查詢
          </button>
        </div>
      </div>

    </div><!-- /card-inner -->
  </div><!-- /main-card -->

  <!-- FOOTER -->
  <footer class="footer-motto">
    <p class="motto-en">Greater effort leads to greater rewards.</p>
    <p class="motto-zh">你有多努力，成果就有多豐碩。</p>
  </footer>

</div><!-- /page-frame -->

<script>
const answers = {
  1:'C',2:'C',3:'B',4:'B',5:'B',
  6:'A',7:'B',8:'A',9:'C',10:'C',
  11:'A',12:'B',13:'B',14:'A',15:'C',
  16:'B',17:'A',18:'C',19:'C',20:'A',21:'B'
};

const scripts = {
  1: "Both of the girls are eating a lot of food.",
  2: "Peter plays the violin before he watches TV.",
  3: "While Jack is walking, he is using his cellphone.",
  4: "I haven't seen Nicole for a few days.",
  5: "What do you do in your free time?",
  6: "Does your family usually eat at home?",
  7: "How do I look in this yellow skirt?",
  8: "Tony has a good knowledge of insects.",
  9: "Do you know when we will arrive in New York?",
  10: "What should you do if an earthquake happened?",
  11: "I'm not sure if the weather will be good today.",
  12: `M: Kelly? Are you Kelly Wilson?
W: Yeah, I am. You are?
M: I'm Jerry. Jerry Wang.
W: Oh, Jerry. I haven't seen you since you left to study abroad. I think it's been ten years. How have you been?
M: Not bad. And you?
Question: What can we know from the dialogue?`,
  13: `W: Which shirt do you like for your new job?
M: The simpler, the better.
W: How about this one with a pocket on the left?
M: Not bad. I like that type.
W: OK. It comes in 3 colors, white, black, and blue.
M: I'll take the blue one. Blue is my lucky color.
Question: Which shirt does the man pick?`,
  14: `M: Why are there so many insects on the ground?
W: Does it mean that there will be an earthquake?
M: Why do you say that?
W: Some studies show that a few insects and animals know when an earthquake will happen sooner than we do.
M: You mean some insects may feel something is about to happen?
W: That's right.
Question: What can we learn from the dialogue?`,
  15: `W: The dishes were all delicious, and I'm very full.
M: Me, too. How much should we pay for the dinner?
W: Oh, I forgot to bring my wallet. Lucas, could you lend me 500 dollars?
M: No problem, but don't forget the one thousand dollars you borrowed the day before yesterday.
W: Sure. I'll give it back to you tomorrow.
Question: How much will the woman give back to the man?`,
  16: `M: When talking about plants, people usually think of them as simple things which only need light and air. But not all the plants are so nice, and some of them are meat-eating plants. One of the most famous is the Venus flytrap. It waits with its bright red mouth open until an insect lands inside. When the insect tries to fly away, the mouth closes soon. That way, the poor insect is kept inside and never has a chance to get away.
Question: What is true about the plants?`,
  17: `W: Excuse me. Can you tell me how to get to GOGO Department Store?
M: Taking a bus is convenient.
W: What number bus goes there?
M: Either 12 or 16 does.
W: Then...where is the bus stop?
M: It's just over there, across from the bank.
W: Thanks.
Question: What number bus should the woman NOT take?`,
  18: `B: Let's play on the swing.
G: Look, there are so many people in a long line.
B: How about the seesaw? Nobody is playing on it.
G: But I want to try the new slide. It's so tall!
B: All right. I'll follow you.
Question: What will the boy and the girl play on first?`,
  19: `W: Excuse me. I would like to get my package.
M: May I have the last three numbers of your phone number and your last name?
W: 006 and Bush, B-U-S-H.
M: Yes, we got your package. Please wait a minute.
W: No problem.
M: Here is your package.
Question: Where may this dialogue take place?`,
  20: `M: Nina, this is Michael. I'm sorry I can't have dinner with you tonight. A little boy will be sent to my workplace in five minutes. We all have to prepare well to treat him. After taking care of him, I will need to check on him once an hour to make sure he'll be OK. Sorry about this. I'll buy you dinner next time.
Question: What is true about Michael?`,
  21: `W: Rick, what are you going to do this weekend?
M: I may just stay home and study.
W: What do you think about going to the gym with me?
M: What for?
W: The fact is that I have a badminton game coming up, and I need someone to practice with me. So, can you come?
M: Sure. I'll be glad to practice with you.
Question: What can we learn from the dialogue?`
};

// Build answers grid
function buildAnswersGrid() {
  const grid = document.getElementById('answersGrid');
  if (grid.children.length > 0) return;
  for (let i = 1; i <= 21; i++) {
    const cell = document.createElement('div');
    cell.className = 'answer-cell';
    cell.innerHTML = `<div class="answer-num">第 ${i} 題</div><div class="answer-val">${answers[i]}</div>`;
    grid.appendChild(cell);
  }
}

// Step 1
let audioShown = false;
function toggleAudio() {
  audioShown = !audioShown;
  const wrapper = document.getElementById('audioWrapper');
  const btn = document.getElementById('audioBtn');
  if (audioShown) {
    wrapper.classList.add('visible');
    btn.textContent = '收起音檔';
  } else {
    wrapper.classList.remove('visible');
    btn.textContent = '點我聽聽力';
    document.getElementById('audioPlayer').pause();
  }
}

// Step 2
let answersShown = false;
function showAnswers() {
  if (!answersShown) {
    buildAnswersGrid();
    document.getElementById('answersWrapper').classList.add('visible');
    answersShown = true;
  }
}

// Step 3
let analysisShown = false;
function showAnalysis() {
  if (!analysisShown) {
    document.getElementById('analysisWrapper').classList.add('visible');
    analysisShown = true;
  }
}

function lookupAnalysis() {
  const raw = document.getElementById('queryInput').value.trim();
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!raw) {
    errEl.textContent = '請輸入題號。';
    errEl.style.display = 'block';
    return;
  }

  const parts = raw.split(/[,，\s]+/).filter(Boolean);
  const nums = [];
  let invalid = false;

  for (const p of parts) {
    const n = parseInt(p, 10);
    if (isNaN(n) || n < 1 || n > 21) { invalid = true; break; }
    if (!nums.includes(n)) nums.push(n);
  }

  if (invalid) {
    errEl.textContent = '請輸入 1 到 21 之間的有效題號。';
    errEl.style.display = 'block';
    return;
  }

  if (nums.length > 5) {
    errEl.textContent = `一次最多查詢 5 題，您輸入了 ${nums.length} 題，請減少題數。`;
    errEl.style.display = 'block';
    return;
  }

  // Render results
  const area = document.getElementById('resultsArea');
  area.innerHTML = '';
  nums.sort((a, b) => a - b);

  for (const n of nums) {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-header">
        <span class="result-num-badge">第 ${n} 題</span>
        <span class="result-answer-badge">答案：${answers[n]}</span>
      </div>
      <p class="result-script-label">▎ 聽力稿</p>
      <p class="result-script">${scripts[n]}</p>
    `;
    area.appendChild(card);
  }

  area.classList.add('visible');
  document.getElementById('resetBtn').classList.add('visible');
  document.getElementById('queryInput').disabled = true;
  document.querySelector('.btn-query').disabled = true;
  document.querySelector('.btn-query').style.opacity = '0.4';
}

function resetQuery() {
  document.getElementById('queryInput').value = '';
  document.getElementById('queryInput').disabled = false;
  document.querySelector('.btn-query').disabled = false;
  document.querySelector('.btn-query').style.opacity = '1';
  document.getElementById('resultsArea').classList.remove('visible');
  document.getElementById('resultsArea').innerHTML = '';
  document.getElementById('resetBtn').classList.remove('visible');
  document.getElementById('errorMsg').style.display = 'none';
}
</script>
</body>
</html>
